name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier check
        id: prettier
        run: npx prettier --check .
        continue-on-error: true

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintStatus = "${{ steps.eslint.outcome }}";
            const prettierStatus = "${{ steps.prettier.outcome }}";
            const commentBody = `
            ## Code Quality Report
            ### ESLint: ${eslintStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            ### Prettier: ${prettierStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: test
        run: npm test -- --coverage
        continue-on-error: true

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = "${{ steps.test.outcome }}";
            const commentBody = `
            ## Test Coverage Report
            ### Test Suite: ${testStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            ### Coverage Summary: (Detailed coverage report available as artifact)
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check
        id: npm-audit
        run: npm audit --json > audit.json || true
        continue-on-error: true

      - name: Scan for secrets
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output: json
        continue-on-error: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditStatus = "${{ steps.npm-audit.outcome }}";
            const secretScanStatus = "${{ steps.secret-scan.outcome }}";
            const commentBody = `
            ## Security Scan Report
            ### Dependencies: ${auditStatus === 'success' ? '✅ No vulnerabilities found' : '⚠️ Vulnerabilities detected (check audit.json)'}
            ### Secrets: ${secretScanStatus === 'success' ? '✅ No secrets found' : '⚠️ Secrets detected (check scan output)'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: npm run build
        continue-on-error: true

      - name: Validate build artifacts
        id: validate
        run: |
          if [ -d "build" ]; then
            echo "✅ Build directory exists"
          else
            echo "❌ Build directory missing"
            exit 1
          fi
        continue-on-error: true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = "${{ steps.build.outcome }}";
            const validateStatus = "${{ steps.validate.outcome }}";
            const commentBody = `
            ## Build Validation
            ### Build: ${buildStatus === 'success' ? '✅ Successful' : '❌ Failed'}
            ### Artifacts: ${validateStatus === 'success' ? '✅ Validated' : '❌ Invalid'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
